<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaybos: Drive to the Finals</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --court: #0a0a0f;
    --panel: #13131a;
    --card: #1c1c26;
    --border: #2a2a38;
    --gold: #f5c518;
    --gold-dim: #c9a014;
    --red: #e03030;
    --green: #22c55e;
    --text: #f0f0f0;
    --muted: #6b6b80;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--court); color:var(--text); min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 80% 40% at 50% 100%,rgba(245,197,24,0.04) 0%,transparent 70%); pointer-events:none; z-index:0; }
  .screen { display:none; min-height:100vh; position:relative; z-index:1; }
  .screen.active { display:flex; flex-direction:column; }

  #loginScreen { align-items:center; justify-content:center; padding:40px 20px; }
  .login-box { width:100%; max-width:380px; text-align:center; }
  .login-logo { font-family:'Bebas Neue',sans-serif; font-size:44px; letter-spacing:3px; color:var(--gold); line-height:1.1; margin-bottom:2px; }
  .login-tag { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:4px; color:var(--text); margin-bottom:6px; }
  .login-sub { color:var(--muted); font-size:11px; letter-spacing:3px; text-transform:uppercase; margin-bottom:32px; }
  .login-card { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:26px; }
  .login-card h2 { font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:1px; margin-bottom:18px; }
  .form-group { margin-bottom:14px; text-align:left; }
  .form-group label { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:6px; }
  .form-input { width:100%; padding:12px 14px; background:var(--card); border:1px solid var(--border); border-radius:9px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; }
  .form-input:focus { border-color:var(--gold); }
  .btn-primary { width:100%; padding:13px; background:var(--gold); color:var(--court); border:none; border-radius:9px; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:1px; cursor:pointer; transition:all 0.15s; margin-top:4px; }
  .btn-primary:hover { background:#ffd93d; }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
  .login-error { color:var(--red); font-size:12px; margin-top:10px; padding:8px 12px; background:rgba(224,48,48,0.1); border-radius:6px; border:1px solid rgba(224,48,48,0.2); display:none; }

  nav { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); background:rgba(10,10,15,0.97); position:sticky; top:0; z-index:100; backdrop-filter:blur(10px); gap:10px; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:2px; color:var(--gold); line-height:1; white-space:nowrap; }
  .logo span { color:var(--text); }
  .nav-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:14px; color:var(--court); cursor:pointer; flex-shrink:0; }
  .nav-tabs { display:flex; gap:3px; background:var(--panel); border-radius:7px; padding:3px; }
  .nav-tab { padding:5px 10px; border-radius:5px; font-size:12px; font-weight:500; cursor:pointer; color:var(--muted); transition:all 0.2s; border:none; background:none; white-space:nowrap; }
  .nav-tab:hover { color:var(--text); }
  .nav-tab.active { background:var(--card); color:var(--gold); }
  .content { flex:1; padding:18px 16px; max-width:960px; margin:0 auto; width:100%; }

  .calendar-strip { display:flex; gap:7px; overflow-x:auto; padding-bottom:4px; margin-bottom:20px; scrollbar-width:none; }
  .calendar-strip::-webkit-scrollbar { display:none; }
  .day-pill { flex-shrink:0; background:var(--panel); border:1px solid var(--border); border-radius:11px; padding:9px 12px; cursor:pointer; transition:all 0.2s; text-align:center; min-width:68px; position:relative; }
  .day-pill:hover { border-color:rgba(245,197,24,0.3); }
  .day-pill.active { border-color:var(--gold); background:rgba(245,197,24,0.07); }
  .day-pill.locked { opacity:0.65; }
  .dp-today { font-size:8px; color:var(--gold); font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:1px; }
  .dp-day { font-size:9px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:2px; }
  .dp-date { font-family:'Bebas Neue',sans-serif; font-size:19px; color:var(--text); line-height:1; margin-bottom:3px; }
  .day-pill.active .dp-date { color:var(--gold); }
  .dp-teams { font-size:8px; color:var(--muted); line-height:1.4; }
  .pick-dot { width:6px; height:6px; border-radius:50%; background:var(--green); position:absolute; top:7px; right:7px; }
  .lock-dot { width:6px; height:6px; border-radius:50%; background:var(--red); position:absolute; top:7px; right:7px; }

  .day-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:8px; }
  .day-header h1 { font-family:'Bebas Neue',sans-serif; font-size:27px; letter-spacing:2px; }
  .day-header h1 span { color:var(--gold); }
  .status-badge { display:flex; align-items:center; gap:6px; padding:6px 11px; border-radius:7px; font-size:11px; font-weight:600; letter-spacing:0.5px; white-space:nowrap; }
  .status-badge.open { background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.3); color:var(--green); }
  .status-badge.future { background:rgba(245,197,24,0.1); border:1px solid rgba(245,197,24,0.25); color:var(--gold); }
  .status-badge.locked { background:rgba(224,48,48,0.1); border:1px solid rgba(224,48,48,0.25); color:var(--red); }
  .dot { width:6px; height:6px; border-radius:50%; }
  .dot.green { background:var(--green); animation:pulse 2s infinite; }
  .dot.gold { background:var(--gold); }
  .dot.red { background:var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .section-label { font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:9px; }
  .my-pick-card { background:var(--panel); border:1px solid var(--border); border-radius:13px; padding:15px; margin-bottom:20px; }
  .pick-empty { display:flex; align-items:center; gap:12px; color:var(--muted); }
  .pick-slot { width:46px; height:46px; border-radius:10px; border:2px dashed var(--border); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .pick-slot-saved { width:46px; height:46px; border-radius:10px; background:linear-gradient(135deg,rgba(245,197,24,0.2),rgba(245,197,24,0.05)); border:1px solid rgba(245,197,24,0.3); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .pick-slot-locked { width:46px; height:46px; border-radius:10px; background:rgba(224,48,48,0.1); border:1px solid rgba(224,48,48,0.3); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .pick-info { flex:1; min-width:0; }
  .pick-info h3 { font-size:15px; font-weight:600; }
  .pick-info p { font-size:11px; color:var(--muted); margin-top:2px; }
  .pick-actions { display:flex; align-items:center; gap:7px; flex-shrink:0; }
  .pick-total { font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--gold); line-height:1; }
  .btn-edit { padding:5px 11px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--muted); font-size:11px; font-weight:600; cursor:pointer; transition:all 0.2s; }
  .btn-edit:hover { border-color:var(--gold); color:var(--gold); }

  .game-section { margin-bottom:22px; }
  .game-header { display:flex; align-items:center; gap:7px; margin-bottom:10px; padding-bottom:9px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .team-tag { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:1px; padding:2px 8px; border-radius:4px; }
  .vs { color:var(--muted); font-size:10px; }
  .game-meta { color:var(--muted); font-size:11px; }
  .game-time { margin-left:auto; color:var(--muted); font-size:10px; }
  .player-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:7px; }
  .player-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:11px; cursor:pointer; transition:all 0.2s; position:relative; }
  .player-card:hover:not(.used):not(.day-locked) { border-color:rgba(245,197,24,0.4); background:rgba(245,197,24,0.04); transform:translateY(-1px); }
  .player-card.selected { border-color:var(--gold); background:rgba(245,197,24,0.07); }
  .player-card.used { opacity:0.35; cursor:not-allowed; }
  .player-card.day-locked { cursor:default; }
  .player-name { font-weight:600; font-size:12px; margin-bottom:1px; line-height:1.3; }
  .player-pos { font-size:9px; color:var(--muted); margin-bottom:7px; }
  .player-stats { display:flex; gap:7px; }
  .stat { text-align:center; }
  .stat .val { font-family:'Bebas Neue',sans-serif; font-size:16px; line-height:1; }
  .stat .lbl { font-size:8px; color:var(--muted); letter-spacing:0.5px; }
  .avg-lbl { font-size:9px; color:var(--gold); margin-top:6px; font-weight:600; }
  .card-badge { position:absolute; top:7px; right:7px; font-size:8px; border-radius:3px; padding:1px 4px; font-weight:600; }
  .badge-used { color:var(--muted); background:var(--panel); border:1px solid var(--border); }
  .badge-pick { color:var(--gold); background:rgba(245,197,24,0.1); border:1px solid rgba(245,197,24,0.3); }

  .confirm-bar { position:sticky; bottom:0; background:rgba(10,10,15,0.97); border-top:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; gap:12px; backdrop-filter:blur(10px); z-index:50; }
  .confirm-info { font-size:13px; color:var(--muted); }
  .confirm-info strong { color:var(--text); }
  .btn-save { padding:10px 22px; background:var(--gold); color:var(--court); border:none; border-radius:8px; font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:1px; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
  .btn-save:hover { background:#ffd93d; }

  .lb-header { margin-bottom:20px; }
  .lb-header h1 { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; margin-bottom:3px; }
  .lb-header p { color:var(--muted); font-size:12px; }
  .lb-card { background:var(--panel); border:1px solid var(--border); border-radius:13px; overflow:hidden; margin-bottom:20px; }
  .lb-row { display:flex; align-items:center; padding:14px 16px; border-bottom:1px solid var(--border); gap:12px; }
  .lb-row:last-child { border-bottom:none; }
  .lb-row.me { background:rgba(245,197,24,0.04); }
  .lb-rank { font-family:'Bebas Neue',sans-serif; font-size:19px; width:26px; text-align:center; color:var(--muted); }
  .lb-rank.gold { color:var(--gold); }
  .lb-rank.silver { color:#b0b0c0; }
  .lb-rank.bronze { color:#cd7f32; }
  .lb-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:14px; flex-shrink:0; }
  .lb-info { flex:1; }
  .lb-info h3 { font-weight:600; font-size:14px; }
  .lb-info p { font-size:10px; color:var(--muted); margin-top:1px; }
  .lb-score { text-align:right; }
  .lb-score .big { font-family:'Bebas Neue',sans-serif; font-size:24px; line-height:1; }
  .lb-score .sm { font-size:9px; color:var(--muted); letter-spacing:0.5px; }
  .me-tag { background:rgba(245,197,24,0.1); border:1px solid rgba(245,197,24,0.2); color:var(--gold); font-size:9px; padding:1px 5px; border-radius:3px; margin-left:4px; vertical-align:middle; }

  .reveals-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:9px; margin-bottom:20px; }
  .reveal-card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px; }
  .reveal-card.hidden-card { background:var(--card); text-align:center; padding:22px 14px; }
  .reveal-name { font-size:10px; font-weight:500; color:var(--muted); margin-bottom:7px; text-transform:uppercase; letter-spacing:1px; }
  .reveal-icon { font-size:24px; margin-bottom:5px; }
  .reveal-text { font-size:11px; color:var(--muted); line-height:1.5; }

  .score-bar { background:var(--panel); border:1px solid var(--border); border-radius:13px; padding:16px; margin-bottom:20px; display:flex; align-items:center; gap:16px; }
  .big-num { font-family:'Bebas Neue',sans-serif; font-size:48px; color:var(--gold); line-height:1; flex-shrink:0; }
  .score-meta h3 { font-size:14px; font-weight:600; }
  .score-meta p { font-size:11px; color:var(--muted); margin-top:3px; }
  .rank-box { margin-left:auto; text-align:center; background:rgba(245,197,24,0.08); border:1px solid rgba(245,197,24,0.2); border-radius:11px; padding:11px 15px; flex-shrink:0; }
  .rank-box .rnum { font-family:'Bebas Neue',sans-serif; font-size:34px; color:var(--gold); line-height:1; }
  .rank-box p { font-size:9px; color:var(--muted); margin-top:2px; letter-spacing:1px; text-transform:uppercase; }
  .hist-row { display:flex; align-items:center; padding:11px 0; border-bottom:1px solid var(--border); gap:11px; }
  .hist-row:last-child { border-bottom:none; }
  .hist-date { font-size:10px; color:var(--muted); width:66px; flex-shrink:0; }
  .hist-player { flex:1; }
  .hist-player h4 { font-size:12px; font-weight:600; }
  .hist-player p { font-size:10px; color:var(--muted); margin-top:2px; }
  .hist-score { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--gold); flex-shrink:0; }
  .hist-badge { font-size:9px; font-weight:600; padding:2px 5px; border-radius:3px; flex-shrink:0; }
  .hist-badge.saved { background:rgba(245,197,24,0.1); color:var(--gold); border:1px solid rgba(245,197,24,0.2); }
  .hist-badge.locked-b { background:rgba(224,48,48,0.1); color:var(--red); border:1px solid rgba(224,48,48,0.2); }

  .loading { display:flex; align-items:center; justify-content:center; padding:40px; color:var(--muted); font-size:13px; gap:10px; }
  .spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; flex-shrink:0; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .toast { position:fixed; bottom:70px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--green); color:white; padding:10px 20px; border-radius:50px; font-weight:600; font-size:12px; opacity:0; transition:all 0.3s; z-index:999; pointer-events:none; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.gold { background:var(--gold); color:var(--court); }
  .toast.err { background:var(--red); }
</style>
</head>

<div id="loginScreen" class="screen active">

</div>

// ── BDL API ──
// balldontlie.io - free, no key needed for basic use
const BDL = 'https://api.balldontlie.io/v1';

// Cache to avoid repeated API calls
const scheduleCache = {};
const rosterCache = {};
const statsCache = {};

// Fetch playoff games for a given date
async function fetchGamesForDate(dateStr) {
  if (scheduleCache[dateStr]) return scheduleCache[dateStr];
  try {
    const res = await fetch(`${BDL}/games?dates[]=${dateStr}&postseason=true&per_page=20`);
    if (!res.ok) return [];
    const data = await res.json();
    scheduleCache[dateStr] = data.data || [];
    return scheduleCache[dateStr];
  } catch(e) {
    console.log('Schedule fetch error:', e.message);
    return [];
  }
}

// Fetch active roster for a team (by team ID)
async function fetchRosterForTeam(teamId, teamAbbr) {
  if (rosterCache[teamAbbr]) return rosterCache[teamAbbr];
  try {
    // Get season averages for players on this team
    const res = await fetch(`${BDL}/season_averages?season=2025&team_ids[]=${teamId}&per_page=30`);
    if (!res.ok) return [];
    const data = await res.json();
    const players = (data.data || [])
      .filter(p => p.pts > 0)
      .sort((a,b) => (b.pts+b.reb+b.ast) - (a.pts+a.reb+a.ast))
      .slice(0,10)
      .map(p => ({
        id: `${p.player.first_name.toLowerCase()}-${p.player.last_name.toLowerCase()}-${p.player.id}`,
        name: `${p.player.first_name} ${p.player.last_name}`,
        pos: p.player.position || 'F',
        pts: parseFloat(p.pts.toFixed(1)),
        reb: parseFloat(p.reb.toFixed(1)),
        ast: parseFloat(p.ast.toFixed(1)),
        team: teamAbbr,
        bdlId: p.player.id,
      }));
    rosterCache[teamAbbr] = players;
    return players;
  } catch(e) {
    console.log('Roster fetch error:', e.message);
    return [];
  }
}

// Fetch actual game stats for a player on a date
async function fetchPlayerGameStats(playerBdlId, dateStr) {
  const key = `${playerBdlId}_${dateStr}`;
  if (statsCache[key] !== undefined) return statsCache[key];
  try {
    const res = await fetch(`${BDL}/stats?player_ids[]=${playerBdlId}&dates[]=${dateStr}&per_page=5`);
    if (!res.ok) { statsCache[key] = null; return null; }
    const data = await res.json();
    if (!data.data || data.data.length === 0) { statsCache[key] = null; return null; }
    const s = data.data[0];
    const result = { pts: s.pts||0, reb: s.reb||0, ast: s.ast||0 };
    statsCache[key] = result;
    return result;
  } catch(e) {
    statsCache[key] = null;
    return null;
  }
}

// Auto-update scores for all locked picks without scores
async function autoUpdateScores() {
  const { data: picks } = await sb.from('picks').select('*').eq('locked', true).is('pts', null);
  if (!picks || picks.length === 0) return;

  for (const pick of picks) {
    // Extract BDL player ID from our composite ID
    const parts = pick.player_id.split('-');
    const bdlId = parts[parts.length - 1];
    if (!bdlId || isNaN(bdlId)) continue;

    const stats = await fetchPlayerGameStats(parseInt(bdlId), pick.day_date);
    if (stats) {
      await sb.from('picks').update({ pts: stats.pts, reb: stats.reb, ast: stats.ast }).eq('id', pick.id);
    }
  }
}

// Lock picks that are past tip-off
async function lockPastPicks() {
  const now = new Date();
  // Lock all picks for dates before today
  const today = now.toISOString().split('T')[0];
  await sb.from('picks')
    .update({ locked: true })
    .lt('day_date', today)
    .eq('locked', false);
}

async function initApp(user) {
  currentUser = user;

async function seedUserData() {
  const { data: prof } = await sb.from('profiles').select('id').eq('id', currentUser.id).maybeSingle();
  if (!prof) await sb.from('profiles').insert({ id: currentUser.id, name: currentProfile.name });

  const email = currentUser.email.toLowerCase();
  const myDay1 = DAY1_PICKS.find(p => p.email === email);
  if (myDay1) {
    const { data: existing } = await sb.from('picks').select('id').eq('user_id', currentUser.id).eq('day_date', myDay1.day_date).maybeSingle();
    if (!existing) {
      await sb.from('picks').insert({
        user_id: currentUser.id,
        day_date: myDay1.day_date,
        player_id: myDay1.player_id,
        player_name: myDay1.player_name,
        team: myDay1.team,
        locked: true,
        pts: null, reb: null, ast: null,
      });
    }
  }
}

async function loadAllPicks() {
  const { data } = await sb.from('picks').select('*');
  allPicks = {};
  if (data) {
    data.forEach(pick => {
      if (!allPicks[pick.user_id]) allPicks[pick.user_id] = {};
      allPicks[pick.user_id][pick.day_date] = pick;
    });
  }
}

// ── BUILD CALENDAR FROM API ──
async function buildCalendar() {
  playoffDays = [];

  // Always include day 1 (locked)
  const day1Games = await fetchGamesForDate('2026-04-18');
  if (day1Games.length > 0) {
    playoffDays.push(await buildDay('2026-04-18', day1Games, 'locked'));
  } else {
    // Fallback hardcoded day 1
    playoffDays.push({
      isoDate: '2026-04-18',
      label: 'SAT APR 18',
      shortDate: '18',
      dayName: 'SAT',
      status: 'locked',
      games: [
        {home:'CLE',away:'TOR',time:'1:00PM ET',label:'G1'},
        {home:'MIN',away:'DEN',time:'3:30PM ET',label:'G1'},
        {home:'NYK',away:'ATL',time:'6:00PM ET',label:'G1'},
        {home:'LAL',away:'HOU',time:'8:30PM ET',label:'G1'},
      ],
      players: {}
    });
  }

  // Fetch next 14 days to cover round 1 and into round 2
  const now = new Date();
  for (let i = 0; i <= 30; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() + i - 1); // start from yesterday to catch today
    const dateStr = d.toISOString().split('T')[0];
    if (dateStr === '2026-04-18') continue; // already added

    const games = await fetchGamesForDate(dateStr);
    if (games.length > 0) {
      const isPast = dateStr < todayStr;
      const isToday = dateStr === todayStr;
      const status = isPast ? 'locked' : isToday ? 'open' : 'future';
      playoffDays.push(await buildDay(dateStr, games, status));
    }
  }

  // Sort by date
  playoffDays.sort((a,b) => a.isoDate.localeCompare(b.isoDate));

  // Set default active day to today or most recent
  const todayDay = playoffDays.find(d => d.isoDate === todayStr);
  if (todayDay) activeDayId = todayDay.isoDate;
  else {
    const future = playoffDays.find(d => d.status === 'future');
    const latest = playoffDays.filter(d => d.status === 'locked').pop();
    activeDayId = future?.isoDate || latest?.isoDate || playoffDays[0]?.isoDate;
  }
}

async function buildDay(dateStr, games, status) {
  const d = new Date(dateStr + 'T12:00:00');
  const dayNames = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const monthNames = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  
  const gameList = games.map(g => ({
    home: g.home_team.abbreviation,
    away: g.visitor_team.abbreviation,
    homeId: g.home_team.id,
    awayId: g.visitor_team.id,
    time: formatTime(g.status),
    label: `G${g.period || 1}`,
    gameId: g.id,
  }));

  // Pre-fetch rosters for all teams (async, will populate as needed)
  const playersByTeam = {};
  
  return {
    isoDate: dateStr,
    dayName: dayNames[d.getDay()],
    shortDate: String(d.getDate()),
    label: `${dayNames[d.getDay()]} ${monthNames[d.getMonth()]} ${d.getDate()}`,
    status,
    games: gameList,
    playersByTeam,
    _teamIds: {},
  };
}

function formatTime(status) {
  if (!status) return 'TBD';
  if (status.includes('ET') || status.includes('PT')) return status;
  if (status === 'Final' || status === 'final') return 'Final';
  return status;
}

async function getPlayersForDay(day) {
  const allPlayers = [];
  for (const g of day.games) {
    if (!day.playersByTeam[g.home]) {
      day.playersByTeam[g.home] = await fetchRosterForTeam(g.homeId, g.home);
    }
    if (!day.playersByTeam[g.away]) {
      day.playersByTeam[g.away] = await fetchRosterForTeam(g.awayId, g.away);
    }
    allPlayers.push(...(day.playersByTeam[g.home] || []), ...(day.playersByTeam[g.away] || []));
  }
  return allPlayers;
}

function getMyUsedPlayerIds() {
  const myPicksObj = allPicks[currentUser.id] || {};
  return new Set(Object.values(myPicksObj).map(p => p.player_id).filter(Boolean));
}

// ── CALENDAR RENDER ──
function renderCalendar() {
  const strip = document.getElementById('calendarStrip');
  const today = todayStr;
  strip.innerHTML = playoffDays.map(day => {
    const isActive = day.isoDate === activeDayId;
    const myPick = allPicks[currentUser.id]?.[day.isoDate];
    const isToday = day.isoDate === today;
    let cls = 'day-pill' + (isActive?' active':'') + (day.status==='locked'?' locked':'');
    const teams = day.games.map(g => `${g.home}·${g.away}`).join('<br>');
    return `<div class="${cls}" onclick="selectDay('${day.isoDate}')">
      ${isToday?'<div class="dp-today">TODAY</div>':''}
      <div class="dp-day">${day.dayName}</div>
      <div class="dp-date">${day.shortDate}</div>
      <div class="dp-teams">${teams}</div>
      ${myPick && day.status!=='locked' ? '<div class="pick-dot"></div>' : ''}
      ${myPick && day.status==='locked' ? '<div class="lock-dot"></div>' : ''}
    </div>`;
  }).join('');
}

// ── DAY VIEW ──
async function renderDayView(isoDate) {
  document.getElementById('dayView').innerHTML = '<div class="loading"><div class="spinner"></div>Loading players...</div>';
  
  const day = playoffDays.find(d => d.isoDate === isoDate);
  if (!day) { document.getElementById('dayView').innerHTML = '<div class="loading">No games found for this day.</div>'; return; }

  const isLocked = day.status === 'locked';
  const isToday = day.isoDate === todayStr;
  const myPick = allPicks[currentUser.id]?.[day.isoDate];
  const usedIds = getMyUsedPlayerIds();

  // Fetch players
  const allDayPlayers = await getPlayersForDay(day);

  let badge = '';
  if (isLocked) badge = `<div class="status-badge locked"><div class="dot red"></div>PICKS LOCKED</div>`;
  else if (isToday) badge = `<div class="status-badge open"><div class="dot green"></div>OPEN · LOCKS AT TIP-OFF</div>`;
  else badge = `<div class="status-badge future"><div class="dot gold"></div>UPCOMING · CHANGE ANYTIME</div>`;

  let pickHtml = '';
  if (isLocked && myPick) {
    const hasScore = myPick.pts != null;
    const total = hasScore ? myPick.pts + myPick.reb + myPick.ast : '—';
    const statsStr = hasScore ? `${myPick.pts} pts · ${myPick.reb} reb · ${myPick.ast} ast` : 'Stats updating...';
    pickHtml = `<div class="section-label">YOUR LOCKED PICK</div>
    <div class="my-pick-card"><div style="display:flex;align-items:center;gap:12px;">
      <div class="pick-slot-locked">🔒</div>
      <div class="pick-info"><h3>${myPick.player_name}</h3><p>${myPick.team} · ${statsStr}</p></div>
      <div class="pick-total">${total}</div>
    </div></div>`;
  } else if (isLocked && !myPick) {
    pickHtml = `<div class="section-label">YOUR PICK</div>
    <div class="my-pick-card"><div class="pick-empty">
      <div class="pick-slot">😬</div>
      <div><div style="font-weight:600;font-size:14px;">No pick made</div><div style="font-size:12px;margin-top:3px;color:var(--muted);">This day is locked</div></div>
    </div></div>`;
  } else if (myPick && !editingDay) {
    const p = allDayPlayers.find(p => p.id === myPick.player_id);
    const avg = p ? (p.pts+p.reb+p.ast).toFixed(1) : '—';
    pickHtml = `<div class="section-label">YOUR PICK — TAP EDIT TO CHANGE</div>
    <div class="my-pick-card"><div style="display:flex;align-items:center;gap:12px;">
      <div class="pick-slot-saved">⭐</div>
      <div class="pick-info"><h3>${myPick.player_name}</h3><p>${myPick.team} · Avg ${avg} total</p></div>
      <div class="pick-actions">
        <div class="pick-total">${avg}</div>
        <button class="btn-edit" onclick="startEditing()" type="button">✏️ Edit</button>
      </div>
    </div></div>`;
  } else {
    pickHtml = `<div class="section-label">${myPick?'SWAP YOUR PICK':'SELECT A PLAYER'}</div>
    <div class="my-pick-card"><div class="pick-empty">
      <div class="pick-slot">🏀</div>
      <div><div style="font-weight:600;font-size:14px;">${myPick?`Currently: ${myPick.player_name}`:'No pick yet'}</div>
      <div style="font-size:12px;margin-top:3px;color:var(--muted);">Tap any player to select</div></div>
    </div></div>`;
  }

  const grids = day.games.map(g => {
    const tc = TEAM_COLORS[g.home] || {c:'#888',bg:'rgba(136,136,136,0.12)'};
    const ac = TEAM_COLORS[g.away] || {c:'#888',bg:'rgba(136,136,136,0.12)'};
    const gamePlayers = allDayPlayers.filter(p => p.team === g.home || p.team === g.away);
    
    if (gamePlayers.length === 0) return `<div class="game-section">
      <div class="game-header">
        <span class="team-tag" style="background:${tc.bg};color:${tc.c};border:1px solid ${tc.c}44">${g.home}</span>
        <span class="vs">vs</span>
        <span class="team-tag" style="background:${ac.bg};color:${ac.c};border:1px solid ${ac.c}44">${g.away}</span>
        <span class="game-time">${g.time}</span>
      </div>
      <div style="color:var(--muted);font-size:12px;padding:10px 0;">Loading roster...</div>
    </div>`;

    const cards = gamePlayers.map(p => {
      const isSaved = myPick?.player_id === p.id;
      const isSelected = selectedPlayerId === p.id;
      const isUsed = usedIds.has(p.id) && !isSaved;
      let cls = 'player-card';
      if (isUsed) cls += ' used';
      else if (isLocked) cls += ' day-locked';
      if ((isSaved && !editingDay) || isSelected) cls += ' selected';
      const clickable = !isUsed && !isLocked && (editingDay || !myPick || isSaved);
      const avg = (p.pts+p.reb+p.ast).toFixed(1);
      const badge = (isSaved && !editingDay) ? '<span class="card-badge badge-pick">✓ SAVED</span>'
                  : isSelected ? '<span class="card-badge badge-pick">→ SELECT</span>'
                  : isUsed ? '<span class="card-badge badge-used">USED</span>' : '';
      return `<div class="${cls}" onclick="${clickable?`pickPlayer('${p.id}','${isoDate}')`:''}">
        ${badge}
        <div class="player-name">${p.name}</div>
        <div class="player-pos">${p.team} · ${p.pos}</div>
        <div class="player-stats">
          <div class="stat"><div class="val">${p.pts}</div><div class="lbl">PTS</div></div>
          <div class="stat"><div class="val">${p.reb}</div><div class="lbl">REB</div></div>
          <div class="stat"><div class="val">${p.ast}</div><div class="lbl">AST</div></div>
        </div>
        <div class="avg-lbl">∑ ${avg} avg</div>
      </div>`;
    }).join('');

    return `<div class="game-section">
      <div class="game-header">
        <span class="team-tag" style="background:${tc.bg};color:${tc.c};border:1px solid ${tc.c}44">${g.home}</span>
        <span class="vs">vs</span>
        <span class="team-tag" style="background:${ac.bg};color:${ac.c};border:1px solid ${ac.c}44">${g.away}</span>
        <span class="game-meta">${g.label}</span>
        <span class="game-time">${g.time}</span>
      </div>
      <div class="player-grid">${cards}</div>
    </div>`;
  }).join('');

  document.getElementById('dayView').innerHTML = `
    <div class="day-header"><h1>${day.dayName} <span>${day.label.split(' ').slice(1).join(' ')}</span></h1>${badge}</div>
    ${pickHtml}
    <div class="section-label" style="margin-top:4px;">${isLocked?'PLAYERS FROM THIS DAY':'ALL PLAYERS — PICK ONE'}</div>
    ${grids}`;
}

function startEditing() {
  editingDay = true;
  selectedPlayerId = null;
  document.getElementById('confirmBar').style.display = 'none';
  renderDayView(activeDayId);
}

function pickPlayer(playerId, isoDate) {
  const day = playoffDays.find(d => d.isoDate === isoDate);
  if (!day || day.status === 'locked') return;
  selectedPlayerId = playerId;
  
  // Find player name from cached rosters
  let playerName = playerId;
  for (const team of Object.values(day.playersByTeam)) {
    const p = team.find(p => p.id === playerId);
    if (p) { playerName = p.name; break; }
  }
  
  document.getElementById('confirmBar').style.display = 'flex';
  document.getElementById('confirmName').textContent = playerName;
  renderDayView(isoDate);
}

async function savePick() {
  if (!selectedPlayerId) return;
  const day = playoffDays.find(d => d.isoDate === activeDayId);
  
  let player = null;
  for (const team of Object.values(day.playersByTeam)) {
    const p = team.find(p => p.id === selectedPlayerId);
    if (p) { player = p; break; }
  }
  if (!player) return;
  
  const wasEdit = !!(allPicks[currentUser.id]?.[day.isoDate]);
  
  const { error } = await sb.from('picks').upsert({
    user_id: currentUser.id,
    day_date: day.isoDate,
    player_id: player.id,
    player_name: player.name,
    team: player.team,
    locked: false,
    pts: null, reb: null, ast: null,
  }, { onConflict:'user_id,day_date' });
  
  if (error) { showToast('Error saving. Try again.', false, true); return; }
  
  selectedPlayerId = null;
  editingDay = false;
  document.getElementById('confirmBar').style.display = 'none';
  
  await loadAllPicks();
  renderCalendar();
  await renderDayView(activeDayId);
  renderHistory();
  
  showToast(wasEdit ? `✏️ Changed to ${player.name}` : `✅ ${player.name} saved!`, wasEdit);
}

// ── STANDINGS ──
async function renderStandings() {
  const { data: profiles } = await sb.from('profiles').select('*');
  const { data: picks } = await sb.from('picks').select('*');
  if (!profiles || !picks) return;

  const scores = {}, pickCounts = {};
  profiles.forEach(p => { scores[p.id] = 0; pickCounts[p.id] = 0; });
  picks.forEach(pick => {
    if (pick.pts != null) {
      scores[pick.user_id] = (scores[pick.user_id]||0) + pick.pts + pick.reb + pick.ast;
      pickCounts[pick.user_id] = (pickCounts[pick.user_id]||0) + 1;
    }
  });

  const sorted = [...profiles].sort((a,b) => (scores[b.id]||0) - (scores[a.id]||0));
  const rc = ['gold','silver','bronze',''], rs = ['🥇','🥈','🥉','4'];

  document.getElementById('lbList').innerHTML = sorted.map((p,i) => {
    const isMe = p.id === currentUser.id;
    const color = Object.values(USER_MAP).find(u => u.name === p.name)?.color || '#f5c518';
    return `<div class="lb-row${isMe?' me':''}">
      <div class="lb-rank ${rc[i]}">${rs[i]}</div>
      <div class="lb-avatar" style="background:${color}22;color:${color}">${p.name[0]}</div>
      <div class="lb-info"><h3>${p.name}${isMe?'<span class="me-tag">YOU</span>':''}</h3><p>${pickCounts[p.id]||0} picks scored</p></div>
      <div class="lb-score"><div class="big">${scores[p.id]||0}</div><div class="sm">TOTAL</div></div>
    </div>`;
  }).join('');

  // Today's reveals
  const todayPicks = picks.filter(p => p.day_date === todayStr);
  const todayDay = playoffDays.find(d => d.isoDate === todayStr);
  const todayLocked = todayDay?.status === 'locked';

  document.getElementById('revealsGrid').innerHTML = profiles.map(p => {
    const isMe = p.id === currentUser.id;
    const tp = todayPicks.find(t => t.user_id === p.id);
    const color = Object.values(USER_MAP).find(u => u.name === p.name)?.color || '#f5c518';
    if (!tp) return `<div class="reveal-card hidden-card"><div class="reveal-name">${p.name}</div><div class="reveal-icon">⏳</div><div class="reveal-text">No pick yet</div></div>`;
    if (!isMe && !todayLocked) return `<div class="reveal-card hidden-card"><div class="reveal-name">${p.name}</div><div class="reveal-icon">🔒</div><div class="reveal-text">Hidden until tip-off</div></div>`;
    return `<div class="reveal-card"><div class="reveal-name">${p.name}${isMe?' (you)':''}</div>
      <div style="font-weight:600;font-size:13px;margin-bottom:2px;">${tp.player_name}</div>
      <div style="font-size:10px;color:var(--muted);">${tp.team}</div>
    </div>`;
  }).join('');
}

// ── HISTORY ──
async function renderHistory() {
  const { data: picks } = await sb.from('picks').select('*').eq('user_id', currentUser.id).order('day_date', {ascending:true});
  const { data: allPicksData } = await sb.from('picks').select('*');
  const { data: profiles } = await sb.from('profiles').select('*');
  if (!picks) return;

  let total = 0, scored = 0;
  picks.forEach(p => { if (p.pts != null) { total += p.pts+p.reb+p.ast; scored++; } });

  const userScores = {};
  if (profiles && allPicksData) {
    profiles.forEach(p => userScores[p.id] = 0);
    allPicksData.forEach(p => { if (p.pts != null) userScores[p.user_id] = (userScores[p.user_id]||0) + p.pts+p.reb+p.ast; });
  }
  const rank = Object.entries(userScores).sort((a,b)=>b[1]-a[1]).findIndex(([id])=>id===currentUser.id)+1;

  document.getElementById('myTotal').textContent = total;
  document.getElementById('myName').textContent = `${currentProfile.name}'s Score`;
  document.getElementById('myRank').textContent = `#${rank||1}`;
  document.getElementById('myPickCount').textContent = `${picks.length} picks made · ${scored} scored`;

  document.getElementById('histList').innerHTML = picks.length === 0
    ? '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">No picks yet</div>'
    : picks.map(pick => {
        const day = playoffDays.find(d => d.isoDate === pick.day_date);
        const dateLabel = day ? `${day.dayName} ${day.shortDate}` : pick.day_date;
        const hasScore = pick.pts != null;
        const scoreEl = hasScore
          ? `<div class="hist-score">${pick.pts+pick.reb+pick.ast}</div>`
          : pick.locked ? `<div class="hist-badge locked-b">LOCKED</div>` : `<div class="hist-badge saved">SAVED</div>`;
        const statsStr = hasScore ? `${pick.pts} pts · ${pick.reb} reb · ${pick.ast} ast` : pick.team;
        return `<div class="hist-row">
          <div class="hist-date">${dateLabel}</div>
          <div class="hist-player"><h4>${pick.player_name}</h4><p>${statsStr}</p></div>
          ${scoreEl}
        </div>`;
      }).join('');
}

// ── TABS ──
function showTab(tab) {
  ['picks','standings','history'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t===tab ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-tab').forEach((btn,i) => {
    btn.classList.toggle('active', ['picks','standings','history'][i]===tab);
  });
  if (tab==='standings') renderStandings();
  if (tab==='history') renderHistory();
}

// ── TOAST ──
function showToast(msg, isEdit=false, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isEdit?' gold':'') + (isErr?' err':'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}
