<style>

  #loginScreen { align-items:center; justify-content:center; padding:40px 20px; }
  .login-box { width:100%; max-width:380px; text-align:center; }
  .login-logo { font-family:'Bebas Neue',sans-serif; font-size:44px; letter-spacing:3px; color:var(--gold); line-height:1.1; margin-bottom:2px; }
  .login-tag { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:4px; color:var(--text); margin-bottom:6px; }

  .form-input { width:100%; padding:12px 14px; background:var(--card); border:1px solid var(--border); border-radius:9px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; }
  .form-input:focus { border-color:var(--gold); }
  .btn-primary { width:100%; padding:13px; background:var(--gold); color:var(--court); border:none; border-radius:9px; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:1px; cursor:pointer; margin-top:4px; }

  .logo { font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:2px; color:var(--gold); line-height:1; white-space:nowrap; }
  .logo span { color:var(--text); }
  .nav-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:14px; color:var(--court); cursor:pointer; flex-shrink:0; }
  .nav-tabs { display:flex; gap:3px; background:var(--panel); border-radius:7px; padding:3px; }

  .nav-tab:hover { color:var(--text); }

  .content { flex:1; padding:18px 16px; max-width:960px; margin:0 auto; width:100%; }
  .calendar-strip { display:flex; gap:7px; overflow-x:auto; padding-bottom:4px; margin-bottom:20px; scrollbar-width:none; }
  .calendar-strip::-webkit-scrollbar { display:none; }
  .day-pill { flex-shrink:0; background:var(--panel); border:1px solid var(--border); border-radius:11px; padding:9px 12px; cursor:pointer; text-align:center; min-width:68px; position:relative; }
  .day-pill:hover { border-color:rgba(245,197,24,0.3); }

  .dp-day { font-size:9px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:2px; }

  .day-pill.active .dp-date { color:var(--gold); }
  .dp-teams { font-size:8px; color:var(--muted); line-height:1.4; }
  .pick-dot { width:6px; height:6px; border-radius:50%; background:var(--green); position:absolute; top:7px; right:7px; }
  .lock-dot { width:6px; height:6px; border-radius:50%; background:var(--red); position:absolute; top:7px; right:7px; }
  .day-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:8px; }
  .day-header h1 { font-family:'Bebas Neue',sans-serif; font-size:27px; letter-spacing:2px; }
  .day-header h1 span { color:var(--gold); }
  .status-badge { display:flex; align-items:center; gap:6px; padding:6px 11px; border-radius:7px; font-size:11px; font-weight:600; letter-spacing:0.5px; white-space:nowrap; }
  .status-badge.open { background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.3); color:var(--green); }
  .status-badge.future { background:rgba(245,197,24,0.1); border:1px solid rgba(245,197,24,0.25); color:var(--gold); }
  .status-badge.locked { background:rgba(224,48,48,0.1); border:1px solid rgba(224,48,48,0.25); color:var(--red); }
  .dot { width:6px; height:6px; border-radius:50%; }

  .score-bar { background:var(--panel); border:1px solid var(--border); border-radius:13px; padding:16px; margin-bottom:20px; display:flex; align-items:center; gap:16px; }
  .big-num { font-family:'Bebas Neue',sans-serif; font-size:48px; color:var(--gold); line-height:1; flex-shrink:0; }
  .score-meta h3 { font-size:14px; font-weight:600; }
  .score-meta p { font-size:11px; color:var(--muted); margin-top:3px; }
  .rank-box { margin-left:auto; text-align:center; background:rgba(245,197,24,0.08); border:1px solid rgba(245,197,24,0.2); border-radius:11px; padding:11px 15px; flex-shrink:0; }
  .rank-box .rnum { font-family:'Bebas Neue',sans-serif; font-size:34px; color:var(--gold); line-height:1; }
  .rank-box p { font-size:9px; color:var(--muted); margin-top:2px; letter-spacing:1px; text-transform:uppercase; }
  .hist-row { display:flex; align-items:center; padding:11px 0; border-bottom:1px solid var(--border); gap:11px; }
  .hist-row:last-child { border-bottom:none; }
  .hist-date { font-size:10px; color:var(--muted); width:66px; flex-shrink:0; }
  .hist-player { flex:1; }
  .hist-player h4 { font-size:12px; font-weight:600; }
  .hist-player p { font-size:10px; color:var(--muted); margin-top:2px; }
  .hist-score { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--gold); flex-shrink:0; }
  .hist-badge { font-size:9px; font-weight:600; padding:2px 5px; border-radius:3px; flex-shrink:0; }
  .hist-badge.saved { background:rgba(245,197,24,0.1); color:var(--gold); border:1px solid rgba(245,197,24,0.2); }
  .hist-badge.locked-b { background:rgba(224,48,48,0.1); color:var(--red); border:1px solid rgba(224,48,48,0.2); }
  .loading { display:flex; align-items:center; justify-content:center; padding:40px; color:var(--muted); font-size:13px; gap:10px; }
  .spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .toast { position:fixed; bottom:70px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--green); color:white; padding:10px 20px; border-radius:50px; font-weight:600; font-size:12px; opacity:0; transition:all 0.3s; z-index:999; pointer-events:none; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.gold { background:var(--gold); color:var(--court); }
  .toast.err { background:var(--red); }
</style>

<script>
// ── CONFIG ──
const SUPABASE_URL = 'https://ncjztfqquavyyllcfrqa.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5janp0ZnFxdWF2eXlsbGNmcnFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTk1NzQsImV4cCI6MjA5MjA3NTU3NH0.HW6Aex2_5hMyAy8bV91LbBUiCqApSy87M3YMtE0Q4Ak';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
 
const USER_MAP = {
  'hamduck1@hotmail.com':      { name:'Hamish', color:'#e03030' },
  'sam.goldsworthy@yahoo.com': { name:'Sam',    color:'#3b82f6' },
  'standy_38@hotmail.com':     { name:'Jake',   color:'#22c55e' },
  'jamesleoatkin@gmail.com':   { name:'James',  color:'#a855f7' },
};
 
// Day 1 pre-loaded picks (Apr 18) — will be auto-scored by ESPN API
const DAY1_PICKS = [
  { email:'hamduck1@hotmail.com',      player_name:'Scottie Barnes', team:'TOR', day_date:'2026-04-18', player_id:'espn-4395369' },
  { email:'sam.goldsworthy@yahoo.com', player_name:'LeBron James',   team:'LAL', day_date:'2026-04-18', player_id:'espn-1966' },
  { email:'standy_38@hotmail.com',     player_name:'Jalen Johnson',  team:'ATL', day_date:'2026-04-18', player_id:'espn-4433218' },
  { email:'jamesleoatkin@gmail.com',   player_name:'LeBron James',   team:'LAL', day_date:'2026-04-18', player_id:'espn-1966' },
];
 
// ── ESPN API ──
const ESPN = 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba';
const ESPN_SUMMARY = 'https://site.web.api.espn.com/apis/site/v2/sports/basketball/nba/summary';
 
const cache = { scoreboard:{}, roster:{}, boxscore:{} };
 
// Format date for ESPN: YYYYMMDD
function espnDate(isoDate) { return isoDate.replace(/-/g,''); }
 
// Fetch games for a date
async function fetchScoreboard(isoDate) {
  if (cache.scoreboard[isoDate]) return cache.scoreboard[isoDate];
  try {
    const res = await fetch(`${ESPN}/scoreboard?dates=${espnDate(isoDate)}&limit=20`);
    if (!res.ok) return [];
    const data = await res.json();
    const games = (data.events||[]).filter(e => {
      const notes = e.competitions?.[0]?.notes?.[0]?.headline || '';
      return notes.toLowerCase().includes('playoff') || notes.toLowerCase().includes('finals') || e.season?.slug === 'post-season';
    }).map(e => {
      const comp = e.competitions[0];
      const home = comp.competitors.find(c=>c.homeAway==='home');
      const away = comp.competitors.find(c=>c.homeAway==='away');
      return {
        gameId: e.id,
        home: home.team.abbreviation,
        away: away.team.abbreviation,
        homeId: home.team.id,
        awayId: away.team.id,
        homeColor: '#' + (home.team.color || '666666'),
        awayColor: '#' + (away.team.color || '666666'),
        status: e.status?.type?.description || '',
        time: e.status?.type?.shortDetail || '',
        startTime: e.date,
        notes: comp.notes?.[0]?.headline || '',
      };
    });
    cache.scoreboard[isoDate] = games;
    return games;
  } catch(e) { console.log('scoreboard err:', e); return []; }
}
 
// Fetch team roster
async function fetchRoster(teamId, teamAbbr) {
  if (cache.roster[teamId]) return cache.roster[teamId];
  try {
    const res = await fetch(`${ESPN}/teams/${teamId}/roster`);
    if (!res.ok) return [];
    const data = await res.json();
    const players = (data.athletes||[]).map(a => ({
      id: `espn-${a.id}`,
      espnId: a.id,
      name: a.displayName || a.fullName || 'Unknown',
      pos: a.position?.abbreviation || 'F',
      pts: 0, reb: 0, ast: 0,
      team: teamAbbr,
    }));
    cache.roster[teamId] = players;
    // Fetch averages in background
    enrichRosterWithStats(players);
    return players;
  } catch(e) { console.log('roster err:', e); return []; }
}
 
// Get player season averages from ESPN
async function enrichRosterWithStats(players) {
  // ESPN athlete stats endpoint
  for (const p of players) {
    try {
      const res = await fetch(`https://site.web.api.espn.com/apis/common/v3/sports/basketball/nba/athletes/${p.espnId}/statistics?season=2026`);
      if (!res.ok) continue;
      const data = await res.json();
      const cats = data.categories || [];
      for (const cat of cats) {
        if (cat.name === 'offensive' || cat.name === 'general') {
          for (const s of (cat.stats||[])) {
            if (s.name === 'avgPoints') p.pts = parseFloat(s.value) || 0;
            if (s.name === 'avgRebounds') p.reb = parseFloat(s.value) || 0;
            if (s.name === 'avgAssists') p.ast = parseFloat(s.value) || 0;
          }
        }
      }
    } catch(e) {}
  }
}
 
// Fetch boxscore for a game to get actual player stats
async function fetchBoxscore(gameId) {
  if (cache.boxscore[gameId]) return cache.boxscore[gameId];
  try {
    const res = await fetch(`${ESPN_SUMMARY}?event=${gameId}`);
    if (!res.ok) return null;
    const data = await res.json();
    const players = {};
    const teams = data.boxscore?.players || [];
    for (const team of teams) {
      for (const group of (team.statistics || [])) {
        const labels = group.labels || [];
        const ptsIdx = labels.indexOf('PTS');
        const rebIdx = labels.indexOf('REB');
        const astIdx = labels.indexOf('AST');
        for (const athleteEntry of (group.athletes || [])) {
          const stats = athleteEntry.stats || [];
          const pid = athleteEntry.athlete?.id;
          if (pid && ptsIdx >= 0) {
            players[pid] = {
              pts: parseInt(stats[ptsIdx]) || 0,
              reb: parseInt(stats[rebIdx]) || 0,
              ast: parseInt(stats[astIdx]) || 0,
            };
          }
        }
      }
    }
    cache.boxscore[gameId] = players;
    return players;
  } catch(e) { console.log('boxscore err:', e); return null; }
}
 
// Auto-fetch scores for locked picks
async function autoUpdateScores() {
  const { data: picks } = await sb.from('picks').select('*').eq('locked', true).is('pts', null);
  if (!picks || picks.length === 0) return;
  
  // Group by date
  const byDate = {};
  for (const p of picks) {
    if (!byDate[p.day_date]) byDate[p.day_date] = [];
    byDate[p.day_date].push(p);
  }
  
  for (const dateStr of Object.keys(byDate)) {
    const games = await fetchScoreboard(dateStr);
    for (const game of games) {
      if (game.status !== 'Final' && !game.status.toLowerCase().includes('final')) continue;
      const bs = await fetchBoxscore(game.gameId);
      if (!bs) continue;
      for (const pick of byDate[dateStr]) {
        const espnId = pick.player_id.replace('espn-','');
        if (bs[espnId]) {
          await sb.from('picks').update({
            pts: bs[espnId].pts,
            reb: bs[espnId].reb,
            ast: bs[espnId].ast,
          }).eq('id', pick.id);
        }
      }
    }
  }
}

// ── BUILD CALENDAR ──
async function buildCalendar() {
  playoffDays = [];
  const now = new Date();
  
  // Check 7 days back and 14 days forward
  for (let i = -7; i <= 14; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() + i);
    const dateStr = d.toISOString().split('T')[0];
    
    const games = await fetchScoreboard(dateStr);
    if (games.length === 0) continue;
    
    const isPast = dateStr < todayStr;
    const isToday = dateStr === todayStr;
    const status = isPast ? 'locked' : isToday ? 'open' : 'future';
    
    // Check if any game is still open for today (tip-off not reached)
    let actualStatus = status;
    if (isToday) {
      const firstGame = games.slice().sort((a,b) => new Date(a.startTime) - new Date(b.startTime))[0];
      if (firstGame && new Date(firstGame.startTime) <= now) actualStatus = 'locked';
    }
    
    const dayNames = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const monthNames = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    
    playoffDays.push({
      isoDate: dateStr,
      dayName: dayNames[d.getDay()],
      shortDate: String(d.getDate()),
      monthLabel: monthNames[d.getMonth()],
      status: actualStatus,
      games: games,
      playersByTeam: {},
    });
  }
  
  playoffDays.sort((a,b) => a.isoDate.localeCompare(b.isoDate));
  
  const todayDay = playoffDays.find(d => d.isoDate === todayStr);
  if (todayDay) activeDayId = todayDay.isoDate;
  else {
    const future = playoffDays.find(d => d.status === 'future');
    activeDayId = future?.isoDate || playoffDays[playoffDays.length-1]?.isoDate;
  }
}
 
async function getPlayersForDay(day) {
  const all = [];
  for (const g of day.games) {
    if (!day.playersByTeam[g.home]) day.playersByTeam[g.home] = await fetchRoster(g.homeId, g.home);
    if (!day.playersByTeam[g.away]) day.playersByTeam[g.away] = await fetchRoster(g.awayId, g.away);
    all.push(...(day.playersByTeam[g.home]||[]), ...(day.playersByTeam[g.away]||[]));
  }
  return all;
}
 
function getMyUsedPlayerIds() {
  const mine = allPicks[currentUser.id] || {};
  return new Set(Object.values(mine).map(p => p.player_id).filter(Boolean));
}
 
// ── CALENDAR RENDER ──

    const myPick = allPicks[currentUser.id]?.[day.isoDate];

    let cls = 'day-pill' + (isActive?' active':'') + (day.status==='locked'?' locked':'');
    const teams = day.games.map(g => `${g.home}·${g.away}`).join('<br>');
    return `<div class="${cls}" onclick="selectDay('${day.isoDate}')">
      ${isToday?'<div class="dp-today">TODAY</div>':''}
      <div class="dp-day">${day.dayName}</div>

function startEditing() {
  editingDay = true;
  selectedPlayerId = null;
  document.getElementById('confirmBar').style.display = 'none';
  renderDayView(activeDayId);
}
 
function pickPlayer(playerId, isoDate) {
  const day = playoffDays.find(d => d.isoDate === isoDate);
  if (!day || day.status === 'locked') return;
  selectedPlayerId = playerId;
  let playerName = playerId;
  for (const team of Object.values(day.playersByTeam)) {
    const p = team.find(p => p.id === playerId);
    if (p) { playerName = p.name; break; }
  }
  document.getElementById('confirmBar').style.display = 'flex';
  document.getElementById('confirmName').textContent = playerName;
  renderDayView(isoDate);
}
 
async function savePick() {
  if (!selectedPlayerId) return;
  const day = playoffDays.find(d => d.isoDate === activeDayId);
  let player = null;
  for (const team of Object.values(day.playersByTeam)) {
    const p = team.find(p => p.id === selectedPlayerId);
    if (p) { player = p; break; }
  }
  if (!player) return;
  const wasEdit = !!(allPicks[currentUser.id]?.[day.isoDate]);
  const { error } = await sb.from('picks').upsert({
    user_id: currentUser.id,
    day_date: day.isoDate,
    player_id: player.id,
    player_name: player.name,
    team: player.team,
    locked: false,
    pts: null, reb: null, ast: null,
  }, { onConflict:'user_id,day_date' });
  if (error) { showToast('Error saving. Try again.', false, true); return; }
  selectedPlayerId = null;
  editingDay = false;
  document.getElementById('confirmBar').style.display = 'none';
  await loadAllPicks();
  renderCalendar();
  await renderDayView(activeDayId);
  renderHistory();
  showToast(wasEdit ? `✏️ Changed to ${player.name}` : `✅ ${player.name} saved!`, wasEdit);
}

      <div style="font-size:10px;color:var(--muted);">${tp.team}</div>

// ── HISTORY ──
async function renderHistory() {
  const { data: picks } = await sb.from('picks').select('*').eq('user_id', currentUser.id).order('day_date', {ascending:true});
  const { data: allPicksData } = await sb.from('picks').select('*');
  const { data: profiles } = await sb.from('profiles').select('*');
  if (!picks) return;
  let total = 0, scored = 0;
  picks.forEach(p => { if (p.pts!=null) { total += p.pts+p.reb+p.ast; scored++; } });
  const userScores = {};
  if (profiles && allPicksData) {
    profiles.forEach(p => userScores[p.id] = 0);
    allPicksData.forEach(p => { if (p.pts!=null) userScores[p.user_id] = (userScores[p.user_id]||0)+p.pts+p.reb+p.ast; });
  }
  const rank = Object.entries(userScores).sort((a,b)=>b[1]-a[1]).findIndex(([id])=>id===currentUser.id)+1;
  document.getElementById('myTotal').textContent = total;
  document.getElementById('myName').textContent = `${currentProfile.name}'s Score`;
  document.getElementById('myRank').textContent = `#${rank||1}`;
  document.getElementById('myPickCount').textContent = `${picks.length} picks made · ${scored} scored`;
  document.getElementById('histList').innerHTML = picks.length === 0
    ? '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">No picks yet</div>'
    : picks.map(pick => {
        const day = playoffDays.find(d => d.isoDate === pick.day_date);
        const dateLabel = day ? `${day.dayName} ${day.shortDate}` : pick.day_date;
        const hasScore = pick.pts != null;
        const scoreEl = hasScore ? `<div class="hist-score">${pick.pts+pick.reb+pick.ast}</div>`
          : pick.locked ? `<div class="hist-badge locked-b">LOCKED</div>` : `<div class="hist-badge saved">SAVED</div>`;
        const statsStr = hasScore ? `${pick.pts} pts · ${pick.reb} reb · ${pick.ast} ast` : pick.team;
        return `<div class="hist-row">
          <div class="hist-date">${dateLabel}</div>
          <div class="hist-player"><h4>${pick.player_name}</h4><p>${statsStr}</p></div>
          ${scoreEl}
        </div>`;
      }).join('');
}
 
function showTab(tab) {
  ['picks','standings','history'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t===tab ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-tab').forEach((btn,i) => {
    btn.classList.toggle('active', ['picks','standings','history'][i]===tab);
  });
  if (tab==='standings') renderStandings();
  if (tab==='history') renderHistory();
}
 
function showToast(msg, isEdit=false, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isEdit?' gold':'') + (isErr?' err':'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}
</script>
